<svg width="220" height="180" viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <style>
      .px { }
      .breathe {
        animation: breathe 2.4s ease-in-out infinite;
        transform-origin: 110px 130px;
      }
      @keyframes breathe {
        0%   { transform: scaleY(1) scaleX(1); }
        45%  { transform: scaleY(1.05) scaleX(0.98); }
        55%  { transform: scaleY(1.05) scaleX(0.98); }
        100% { transform: scaleY(1) scaleX(1); }
      }
      .zzz {
        animation: floatUp 3.2s ease-in infinite;
      }
      .zzz2 { animation-delay: 1.1s; }
      .zzz3 { animation-delay: 2.2s; }
      @keyframes floatUp {
        0%   { transform: translate(0,0); opacity: 0; }
        15%  { opacity: 1; }
        80%  { opacity: 1; }
        100% { transform: translate(14px,-34px); opacity: 0; }
      }
      .blink {
        animation: blink 4s steps(1) infinite;
      }
      @keyframes blink {
        0%, 92%, 100% { opacity: 1; }
        94%, 98% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="220" height="180" fill="#0d0d0d"/>

  <!-- ZZZ sleep particles -->
  <g fill="#FF0000" font-family="monospace" font-weight="bold">
    <text x="150" y="50" font-size="14" class="zzz">Z</text>
    <text x="158" y="40" font-size="10" class="zzz zzz2">Z</text>
    <text x="164" y="32" font-size="7" class="zzz zzz3">Z</text>
  </g>

  <!-- creature body, built from pixel blocks -->
  <g class="breathe">
    <!-- main round body silhouette -->
    <g fill="#FF0000">
      <rect x="60"  y="70"  width="10" height="10"/>
      <rect x="70"  y="60"  width="10" height="10"/>
      <rect x="80"  y="50"  width="10" height="10"/>
      <rect x="90"  y="50"  width="10" height="10"/>
      <rect x="100" y="50"  width="10" height="10"/>
      <rect x="110" y="50"  width="10" height="10"/>
      <rect x="120" y="50"  width="10" height="10"/>
      <rect x="130" y="50"  width="10" height="10"/>
      <rect x="140" y="60"  width="10" height="10"/>
      <rect x="150" y="70"  width="10" height="10"/>

      <rect x="50"  y="80"  width="10" height="60"/>
      <rect x="160" y="80"  width="10" height="60"/>

      <rect x="60"  y="140" width="10" height="10"/>
      <rect x="70"  y="150" width="10" height="10"/>
      <rect x="80"  y="150" width="10" height="10"/>
      <rect x="90"  y="150" width="10" height="10"/>
      <rect x="100" y="150" width="10" height="10"/>
      <rect x="110" y="150" width="10" height="10"/>
      <rect x="120" y="150" width="10" height="10"/>
      <rect x="130" y="150" width="10" height="10"/>
      <rect x="140" y="150" width="10" height="10"/>
      <rect x="150" y="140" width="10" height="10"/>

      <!-- fill interior -->
      <rect x="60"  y="80"  width="100" height="60"/>
    </g>

    <!-- darker belly patch (black outline + darker red shading) -->
    <g fill="#8a0000">
      <rect x="80" y="100" width="60" height="40"/>
    </g>
    <g fill="#0d0d0d">
      <rect x="85" y="105" width="50" height="30"/>
    </g>
    <g fill="#8a0000">
      <rect x="90" y="110" width="40" height="20"/>
    </g>

    <!-- small stubby feet -->
    <g fill="#FF0000">
      <rect x="65" y="160" width="20" height="10"/>
      <rect x="135" y="160" width="20" height="10"/>
    </g>
    <g fill="#8a0000">
      <rect x="65" y="160" width="20" height="4"/>
      <rect x="135" y="160" width="20" height="4"/>
    </g>

    <!-- ears -->
    <g fill="#FF0000">
      <rect x="65" y="45" width="10" height="10"/>
      <rect x="145" y="45" width="10" height="10"/>
    </g>
    <g fill="#8a0000">
      <rect x="67" y="47" width="6" height="6"/>
      <rect x="147" y="47" width="6" height="6"/>
    </g>

    <!-- closed sleepy eyes (blink open occasionally) -->
    <g class="blink">
      <rect x="85"  y="85" width="12" height="4" fill="#0d0d0d"/>
      <rect x="123" y="85" width="12" height="4" fill="#0d0d0d"/>
    </g>

    <!-- content little smile -->
    <rect x="100" y="95" width="20" height="4" fill="#0d0d0d"/>
    <rect x="96"  y="91" width="4" height="4" fill="#0d0d0d"/>
    <rect x="120" y="91" width="4" height="4" fill="#0d0d0d"/>
  </g>
</svg>
